<!DOCTYPE html>
<html>
<head>
  <title>Admin - Draw Service Area</title>
  
  <!-- Google Maps API with Drawing Tools -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCPbOZwAZEMiC1LSDSgnSEPmSxQ7-pR2oQ&libraries=drawing,geometry"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; 
      height: 100vh; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #ffffff;
    }
    
    #map { 
      width: 100%; 
      height: 100%; 
    }
    
    .btn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #10b981;
      color: white;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 9999;
      border: none;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #059669;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    /* Info box styles */
    .info-box {
      position: fixed;
      top: 70px;
      right: 10px;
      background: white;
      padding: 12px 16px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 9998;
      font-size: 13px;
      max-width: 250px;
    }
    
    .status-message {
      padding: 8px 12px;
      background: #e8f5e9;
      border-left: 3px solid #10b981;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>
<button class="btn" onclick="saveArea()">💾 Save Area</button>
<div class="info-box" id="infoBox" style="display:none;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
  import { getConfig } from "./config.js"

  // Firebase Setup
  const app = initializeApp(getConfig().firebase)
  const db = getDatabase(app)

  // Google Maps Setup
  let map
  let currentPolygon = null
  let drawingManager
  const SHOP_LOCATION = { lat: 25.246747, lng: 86.976773 }

  // Initialize Map with Google Maps API
  function initializeMap() {
    const mapOptions = {
      zoom: 14,
      center: SHOP_LOCATION,
      mapTypeId: google.maps.MapTypeId.ROADMAP,
      gestureHandling: 'cooperative'
    }

    map = new google.maps.Map(document.getElementById('map'), mapOptions)

    // Initialize Drawing Manager
    drawingManager = new google.maps.drawing.DrawingManager({
      drawingMode: google.maps.drawing.OverlayType.POLYGON,
      drawingControl: true,
      drawingControlOptions: {
        position: google.maps.ControlPosition.TOP_LEFT,
        drawingModes: [
          google.maps.drawing.OverlayType.POLYGON
        ]
      },
      polygonOptions: {
        clickable: true,
        editable: true,
        strokeColor: '#16a34a',
        fillColor: '#22c55e',
        fillOpacity: 0.25,
        strokeWeight: 2
      }
    })

    drawingManager.setMap(map)

    // Add Shop Location Marker
    const shopMarker = new google.maps.Marker({
      position: SHOP_LOCATION,
      map: map,
      title: 'Our Shop Location',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: '#10b981',
        fillOpacity: 0.8,
        strokeColor: '#059669',
        strokeWeight: 3
      }
    })

    // Add Info Window for Shop
    const shopInfoWindow = new google.maps.InfoWindow({
      content: '<div style="font-weight:600; color:#10b981;">Our Shop Location</div>'
    })
    shopMarker.addListener('click', () => {
      shopInfoWindow.open(map, shopMarker)
    })

    // Handle polygon drawing completion
    map.addListener('overlaycomplete', (event) => {
      // Remove previous polygon
      if (currentPolygon) {
        currentPolygon.setMap(null)
      }

      if (event.type === google.maps.drawing.OverlayType.POLYGON) {
        currentPolygon = event.overlay
        
        // Make polygon editable
        currentPolygon.setEditable(true)
        
        // Listen for polygon updates
        google.maps.event.addListener(currentPolygon, 'click', () => {
          currentPolygon.setEditable(true)
        })

        // Show success message
        showInfo('✅ Polygon created! Click to edit, then save.')
        
        // Disable drawing mode after selection
        drawingManager.setDrawingMode(null)
      }
    })

    // Load Service Area from Firebase (if exists)
    loadServiceAreaFromFirebase()
  }

  // Load existing service area from Firebase
  function loadServiceAreaFromFirebase() {
    const dbRef = ref(db, "serviceArea")
    import { onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
    
    onValue(dbRef, (snapshot) => {
      const data = snapshot.val()
      if (data && Array.isArray(data)) {
        drawPolygonFromCoordinates(data)
      }
    })
  }

  // Draw polygon from coordinates
  function drawPolygonFromCoordinates(coords) {
    if (currentPolygon) {
      currentPolygon.setMap(null)
    }

    const paths = coords.map(c => ({
      lat: c.lat,
      lng: c.lng
    }))

    currentPolygon = new google.maps.Polygon({
      paths: paths,
      strokeColor: '#16a34a',
      fillColor: '#22c55e',
      fillOpacity: 0.25,
      strokeWeight: 2,
      editable: true,
      map: map
    })

    // Fit map to polygon bounds
    const bounds = new google.maps.LatLngBounds()
    currentPolygon.getPath().forEach(coord => {
      bounds.extend(coord)
    })
    map.fitBounds(bounds)
  }

  // Save Service Area to Firebase
  window.saveArea = async function () {
    if (!currentPolygon) {
      alert("⚠️ Draw a polygon first!")
      return
    }

    try {
      const coords = currentPolygon.getPath().getArray().map(latLng => ({
        lat: latLng.lat(),
        lng: latLng.lng()
      }))

      await set(ref(db, "serviceArea"), coords)

      alert("✅ Service area saved successfully!")
      showInfo('✅ Area saved to Firebase!')
    } catch (error) {
      console.error('Error saving area:', error)
      alert("❌ Error saving area: " + error.message)
    }
  }

  // Show info message
  function showInfo(message) {
    const infoBox = document.getElementById('infoBox')
    infoBox.innerHTML = `<div class="status-message">${message}</div>`
    infoBox.style.display = 'block'
    
    setTimeout(() => {
      infoBox.style.display = 'none'
    }, 4000)
  }

  // Initialize map when page loads
  window.addEventListener('load', initializeMap)
</script>

</body>
</html>
