<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getConfig } from "./config.js";

const app = initializeApp(getConfig().firebase);
const db = getDatabase(app);

let partner=null;
let currentPos=null;

// 📍 LIVE GPS
navigator.geolocation.watchPosition(pos=>{
  currentPos={
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  };
});

// 🚀 START
window.start=()=>{
  partner=document.getElementById("partner").value;
  if(!partner) return alert("Select partner");
  loadOrders();
};

// 📦 LOAD ORDERS
function loadOrders(){
  onValue(ref(db,"orders"),snap=>{
    const data=snap.val()||{};
    const list=Object.entries(data)
      .filter(([k,o])=>(o.assignedTo||"").toLowerCase()===partner.toLowerCase())
      .map(([k,o])=>({key:k,...o}));

    render(list);
  });
}

// 🎨 UI
function render(orders){
  document.getElementById("orders").innerHTML=
    orders.map(o=>`
    <div class="card">
      <b>🧾 Order #${o.orderId || ""}</b>

      <p>📱 ${o.phoneNumber || ""}</p>
      <p>📍 ${o.address || ""}</p>

      <p>💰 Price: ₹${o.price || 0}</p>

      ${o.image ? `<img src="${o.image}" width="100%">` : ""}

      <p>📦 Status: <b>${o.status || "pending"}</b></p>

      ${o.status !== "delivered" ? `
        <p style="color:orange;font-weight:bold;">🚴 Rider is on the way...</p>

        <div id="map-${o.key}" class="map"></div>

        <button class="btn btn-success" onclick="startDelivery('${o.key}')">🚀 Start</button>
        <button class="btn btn-danger" onclick="markDelivered('${o.key}')">✅ Delivered</button>
        <button class="btn btn-info" onclick="share('${o.key}','${o.phoneNumber}')">💬 Share</button>
      ` : `
        <p style="color:green;font-weight:bold;">✅ Delivered</p>
      `}
    </div>
    `).join("");

  orders.forEach(o=>{
    if(o.status !== "delivered"){
      initMap(o);
    }
  });
}

// 🏍️ BIKE ICON
const bikeIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/2972/2972185.png",
  iconSize: [40,40]
});

// 🎯 SMOOTH ANIMATION
function animateMarker(marker, from, to, duration=2000){
  const start = performance.now();

  function step(now){
    const progress = Math.min((now - start)/duration, 1);

    const lat = from.lat + (to.lat - from.lat)*progress;
    const lng = from.lng + (to.lng - from.lng)*progress;

    marker.setLatLng([lat, lng]);

    if(progress < 1){
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

// 🗺️ MAP + TRACK
function initMap(order){
  if(!order.lat || !order.lng) return;

  const map=L.map(`map-${order.key}`).setView([order.lat,order.lng],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const customer=L.marker([order.lat,order.lng]).addTo(map);

  let riderMarker;
  let line;

  const interval=setInterval(()=>{
    if(!currentPos) return;

    if(order.status==="delivered"){
      clearInterval(interval);
      return;
    }

    const {lat,lng}=currentPos;

    update(ref(db,"orders/"+order.key),{
      riderLat:lat,
      riderLng:lng
    });

    // 🚴 Rider movement
    if(!riderMarker){
      riderMarker=L.marker([lat,lng],{icon:bikeIcon}).addTo(map);
    }else{
      const prev=riderMarker.getLatLng();

      animateMarker(
        riderMarker,
        {lat:prev.lat,lng:prev.lng},
        {lat,lng},
        2000
      );
    }

    // 🛣️ Route line
    if(!line){
      line=L.polyline([[lat,lng],[order.lat,order.lng]],{
        color:"#2196F3",
        weight:5,
        opacity:0.7,
        dashArray:"10,10"
      }).addTo(map);
    }else{
      line.setLatLngs([[lat,lng],[order.lat,order.lng]]);
    }

    // 📍 Auto follow rider
    map.panTo([lat,lng]);

  },5000);
}

// 🚀 START DELIVERY
window.startDelivery=(key)=>{
  update(ref(db,"orders/"+key),{status:"on the way"});
};

// ✅ DELIVERED
window.markDelivered=(key)=>{
  update(ref(db,"orders/"+key),{status:"delivered"});
};

// 💬 SHARE
window.share=(key,phone)=>{
  const link=location.origin+location.pathname+"?track="+key;
  const msg="🚚 Track your order:\n"+link;
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
};

// 🌐 CUSTOMER TRACK MODE
const url=new URLSearchParams(location.search);
const trackId=url.get("track");

if(trackId){
  document.body.innerHTML='<div id="map" style="height:100vh"></div>';

  const map=L.map('map').setView([20,77],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let marker;

  onValue(ref(db,"orders/"+trackId),snap=>{
    const o=snap.val();
    if(!o || !o.riderLat) return;

    if(o.status==="delivered"){
      alert("Order Delivered ✅");
      return;
    }

    const pos=[o.riderLat,o.riderLng];

    if(!marker){
      marker=L.marker(pos).addTo(map);
      map.setView(pos,15);
    }else{
      marker.setLatLng(pos);
    }
  });
}
</script>
