<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mirdhuna Delivery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family:Poppins; background:#f5f5f5; padding:10px; }
.header { background:#d40000;color:#fff;padding:12px;border-radius:10px;text-align:center; }
.card { background:#fff;padding:12px;border-radius:10px;margin-top:10px; }
.btn { width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:600; }
.btn-success{background:#4CAF50;color:#fff;}
.btn-info{background:#2196F3;color:#fff;}
.btn-danger{background:#f44336;color:#fff;}
.map{height:220px;margin-top:10px;border-radius:8px;}
img{margin-top:6px;}
</style>
</head>

<body>

<div class="header">🚚 Mirdhuna Delivery</div>

<div class="card">
<select id="partner">
<option value="">Select Partner</option>
<option>Raj</option>
<option>Suresh</option>
<option>Amit</option>
<option>Priya</option>
<option>Vikas</option>
</select>
<button class="btn btn-success" onclick="start()">Start</button>
</div>

<div id="orders"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getConfig } from "./config.js";

const app = initializeApp(getConfig().firebase);
const db = getDatabase(app);

let partner=null;
let currentPos=null;

// 📍 LIVE GPS
navigator.geolocation.watchPosition(pos=>{
  currentPos={
    lat:pos.coords.latitude,
    lng:pos.coords.longitude
  };
});

// 🚀 START
window.start=()=>{
  partner=document.getElementById("partner").value;
  if(!partner) return alert("Select partner");
  loadOrders();
};

// 📦 LOAD ORDERS
function loadOrders(){
  onValue(ref(db,"orders"),snap=>{
    const data=snap.val()||{};
    const list=Object.entries(data)
      .filter(([k,o])=>o.assignedTo===partner)
      .map(([k,o])=>({key:k,...o}));

    render(list);
  });
}

// 🎨 UI
function render(orders){
  document.getElementById("orders").innerHTML=
    orders.map(o=>`
    <div class="card">
      <b>🧾 Order #${o.orderId || ""}</b>

      <p>📱 ${o.phoneNumber || ""}</p>
      <p>📍 ${o.address || ""}</p>

      <p>💰 Price: ₹${o.price || 0}</p>

      ${o.image ? `<img src="${o.image}" width="100%">` : ""}

      <p>📦 Status: <b>${o.status || "pending"}</b></p>

      ${o.status !== "delivered" ? `
        <div id="map-${o.key}" class="map"></div>

        <button class="btn btn-success" onclick="startDelivery('${o.key}')">🚀 Start</button>
        <button class="btn btn-danger" onclick="markDelivered('${o.key}')">✅ Delivered</button>
        <button class="btn btn-info" onclick="share('${o.key}','${o.phoneNumber}')">💬 Share</button>
      ` : `
        <p style="color:green;font-weight:bold;">✅ Delivered</p>
      `}
    </div>
    `).join("");

  orders.forEach(o=>{
    if(o.status !== "delivered"){
      initMap(o);
    }
  });
}

// 🗺️ MAP + TRACK
function initMap(order){
  const map=L.map(`map-${order.key}`).setView([order.lat,order.lng],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const customer=L.marker([order.lat,order.lng]).addTo(map);

  let riderMarker;
  let line;

  const interval=setInterval(()=>{
    if(!currentPos) return;

    if(order.status==="delivered"){
      clearInterval(interval);
      return;
    }

    const {lat,lng}=currentPos;

    update(ref(db,"orders/"+order.key),{
      riderLat:lat,
      riderLng:lng
    });

    if(!riderMarker){
      riderMarker=L.marker([lat,lng]).addTo(map);
    }else{
      riderMarker.setLatLng([lat,lng]);
    }

    if(!line){
      line=L.polyline([[lat,lng],[order.lat,order.lng]],{
        color:"blue"
      }).addTo(map);
    }else{
      line.setLatLngs([[lat,lng],[order.lat,order.lng]]);
    }

  },10000);
}

// 🚀 START DELIVERY
window.startDelivery=(key)=>{
  update(ref(db,"orders/"+key),{status:"on the way"});
};

// ✅ DELIVERED
window.markDelivered=(key)=>{
  update(ref(db,"orders/"+key),{status:"delivered"});
};

// 💬 SHARE
window.share=(key,phone)=>{
  const link=location.origin+location.pathname+"?track="+key;
  const msg="🚚 Track your order:\n"+link;
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
};

// 🌐 CUSTOMER TRACK MODE
const url=new URLSearchParams(location.search);
const trackId=url.get("track");

if(trackId){
  document.body.innerHTML='<div id="map" style="height:100vh"></div>';

  const map=L.map('map').setView([20,77],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let marker;

  onValue(ref(db,"orders/"+trackId),snap=>{
    const o=snap.val();
    if(!o || !o.riderLat) return;

    if(o.status==="delivered"){
      alert("Order Delivered ✅");
      return;
    }

    const pos=[o.riderLat,o.riderLng];

    if(!marker){
      marker=L.marker(pos).addTo(map);
      map.setView(pos,15);
    }else{
      marker.setLatLng(pos);
    }
  });
}
</script>

</body>
</html>
